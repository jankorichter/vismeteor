name: lint

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::lintr
            any::styler
            local::.

      - name: Run lintr
        run: |
          Rscript -e 'l <- lintr::lint_package(show_progress = FALSE); if (length(l) > 0) { print(l); quit(status = 1) }'

      - name: Check styler formatting
        run: |
          Rscript -e 'styler::style_pkg(indent_by = 4L, scope = "tokens", dry = "on")'
          Rscript -e 'styler::style_dir("vignettes", filetype = c("R","Rmd"), indent_by = 4L, dry = "on")'
          git diff --exit-code
